<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Staff Database</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="container">
    <h1>Company Staff Database</h1>

    <div class="card">
      <h2 id="form-title">Add Staff Member</h2>
      <form id="staff-form">
        <div class="form-grid">
          <div class="field">
            <label for="id">Employee ID</label>
            <input type="number" id="id" required>
          </div>
          <div class="field">
            <label for="name">First Name</label>
            <input type="text" id="name" required>
          </div>
          <div class="field">
            <label for="lastname">Last Name</label>
            <input type="text" id="lastname" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" required>
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input type="text" id="phone" required>
          </div>
        </div>
        <div id="form-error" class="error hidden"></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" id="cancel-btn" class="btn btn-secondary hidden" onclick="resetForm()">Cancel</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Staff List</h2>
      <table id="staff-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="staff-tbody">
          <tr id="empty-row"><td colspan="6" class="empty">No staff members found</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
